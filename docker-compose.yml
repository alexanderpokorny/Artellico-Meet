services:
  web:
    image: jitsi/web:stable
    restart: unless-stopped
    volumes:
      - jitsi-web-config:/config:Z
      - jitsi-web-crontabs:/var/spool/cron/crontabs:Z
      - jitsi-transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - PUBLIC_URL=https://meet.artellico.com
      - TZ=Europe/Vienna
      - ENABLE_LETSENCRYPT=0
      - ENABLE_AUTH=${ENABLE_AUTH:-1}
      - AUTH_TYPE=${AUTH_TYPE:-internal}
      - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
      - ENABLE_LOBBY=${ENABLE_LOBBY:-1}
    networks:
      jitsi:
      coolify:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jitsi.rule=Host(`meet.artellico.com`)"
      - "traefik.http.routers.jitsi.entrypoints=https"
      - "traefik.http.routers.jitsi.tls=true"
      - "traefik.http.routers.jitsi.tls.certresolver=letsencrypt"
      - "traefik.http.services.jitsi.loadbalancer.server.port=80"
      - "traefik.http.routers.jitsi-http.rule=Host(`meet.artellico.com`)"
      - "traefik.http.routers.jitsi-http.entrypoints=http"
      - "traefik.http.routers.jitsi-http.middlewares=redirect-to-https"
      - "traefik.docker.network=coolify"

  prosody:
    image: jitsi/prosody:stable
    restart: unless-stopped
    expose:
      - '5222'
      - '5347'
      - '5280'
    volumes:
      - jitsi-prosody-config:/config:Z
      - jitsi-prosody-plugins:/prosody-plugins-custom:Z
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=1
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=1
      - PUBLIC_URL=https://meet.artellico.com
      - TZ=Europe/Vienna
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
    networks:
      jitsi:
        aliases:
          - xmpp.meet.jitsi

  jicofo:
    image: jitsi/jicofo:stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - jitsi-jicofo-config:/config:Z
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=1
      - TZ=Europe/Vienna
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - ENABLE_LOBBY=1
    depends_on:
      - prosody
    networks:
      jitsi:

  jvb:
    image: jitsi/jvb:stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - '${JVB_PORT:-10000}:${JVB_PORT:-10000}/udp'
    volumes:
      - jitsi-jvb-config:/config:Z
    environment:
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - JVB_PORT=${JVB_PORT:-10000}
      - JVB_STUN_SERVERS=stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      - PUBLIC_URL=https://meet.artellico.com
      - TZ=Europe/Vienna
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - COLIBRI_REST_ENABLED=true
    depends_on:
      - prosody
    networks:
      jitsi:

volumes:
  jitsi-web-config:
  jitsi-web-crontabs:
  jitsi-transcripts:
  jitsi-prosody-config:
  jitsi-prosody-plugins:
  jitsi-jicofo-config:
  jitsi-jvb-config:

networks:
  jitsi:
    driver: bridge
  coolify:
    external: true
